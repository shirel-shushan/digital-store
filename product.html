<!DOCTYPE html>
<html lang="he" dir="rtl">
<!--
  product.html — a single product page.
  What you see: on the right a big image with a small image gallery under
  it, on the left the product name, price, description, quantity picker,
  an "Add to cart" button and more details, and at the bottom customer
  reviews.
  Which product to show is decided by the address (product.html?id=number),
  and the content is built by js/product.js into the empty div.
-->

  <!-- Head: settings you do not see on the screen — Hebrew encoding, the
       browser tab title, the small tab icon (favicon) and the link to the main CSS file -->
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מוצר — מרקט פלוס</title>
  <link rel="icon" href="assets/logos/logo-icon.png">
  <link rel="stylesheet" href="css/main.css">
</head>
<body data-page="product">

  <!-- The header (the sticky white top bar with the logo, menu, search and icons).
       This div is empty on purpose — js/header.js fills it when the page loads -->
  <div id="site-header"></div>

  <!-- Main: the central content area of the page -->
  <main>
    <div id="page-content">

      <!-- The empty root where js/product.js draws all the product details -->
      <div id="product-page-root"></div>
    </div>
  </main>

  <!-- The footer (the dark bar at the bottom with the brands strip and contact info).
       Also empty — js/ui.js builds it through header.js -->
  <div id="site-footer"></div>

  <!-- Loading the JavaScript files. The order matters: first the base files
       (api, storage, utils, ui, router) and only then the files that use them -->
  <script src="js/api.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/router.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/favorites.js"></script>
  <script src="js/search.js"></script>
  <script src="js/header.js"></script>
  <script src="js/product.js"></script>
</body>
</html>
